name: Update Formula

on:
  workflow_dispatch:
    inputs:
      formula:
        description: 'Formula name (e.g., solo-cli)'
        required: true
        type: string
      tag:
        description: 'Release tag to update formula for'
        required: true
        type: string
      repository:
        description: 'Source repository (e.g., rursache/solo-cli)'
        required: true
        type: string

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Update formula
        run: |
          FORMULA="${{ github.event.inputs.formula }}"
          TAG="${{ github.event.inputs.tag }}"
          REPO="${{ github.event.inputs.repository }}"
          VERSION="${TAG#v}"

          FORMULA_FILE="Formula/${FORMULA}.rb"

          # Check if formula uses pre-built binaries (multiple url/sha256 blocks)
          URL_COUNT=$(grep -c 'url "' "$FORMULA_FILE" || true)

          if [ "$URL_COUNT" -gt 1 ]; then
            # Binary formula: download checksums and update each platform URL + SHA
            CHECKSUMS_URL="https://github.com/${REPO}/releases/download/${TAG}/checksums.txt"
            curl -sSfL "$CHECKSUMS_URL" -o checksums.txt

            # Update version
            sed -i '' "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA_FILE"

            # Update each platform target
            for TARGET in darwin-arm64 darwin-x64 linux-x64; do
              OLD_URL_PATTERN="bird-v[^\"]*-${TARGET}\\.tar\\.gz"
              NEW_FILE="bird-${TAG}-${TARGET}.tar.gz"
              NEW_URL="https://github.com/${REPO}/releases/download/${TAG}/${NEW_FILE}"
              NEW_SHA=$(grep "${NEW_FILE}" checksums.txt | awk '{print $1}')

              if [ -n "$NEW_SHA" ]; then
                sed -i '' "s|url \".*${OLD_URL_PATTERN}\"|url \"${NEW_URL}\"|" "$FORMULA_FILE"
                # Update the sha256 on the line immediately following the matched url
                python3 -c "
import re, sys
content = open('$FORMULA_FILE').read()
pattern = r'(url \".*${TARGET}\.tar\.gz\")\n(\s*)sha256 \"[a-f0-9]+\"'
replacement = r'\1\n\2sha256 \"${NEW_SHA}\"'
content = re.sub(pattern, replacement, content)
open('$FORMULA_FILE', 'w').write(content)
"
              fi
            done
          else
            # Source formula: single url/sha256
            DOWNLOAD_URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
            curl -L "${DOWNLOAD_URL}" -o "${FORMULA}.tar.gz"
            SHA256=$(shasum -a 256 "${FORMULA}.tar.gz" | awk '{print $1}')
            sed -i '' "s|url \".*\"|url \"${DOWNLOAD_URL}\"|" "$FORMULA_FILE"
            sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$FORMULA_FILE"
          fi

          # Commit and push (skip if formula is already up to date)
          git add "$FORMULA_FILE"
          if git diff --cached --quiet; then
            echo "Formula is already up to date for ${TAG}"
          else
            git commit -m "Update ${FORMULA} to ${TAG}"
            git push
          fi
